  gpu-deep-dive.json: "{\n  \"title\": \"GPU Deep-Dive\",\n  \"uid\": \"gpu_detail\",\n  \"tags\": [\n    \"gpu\",\n    \"deep-dive\",\n    \"dcgm\",\n    \"precision\"\n  ],\n  \"timezone\": \"browser\",\n  \"schemaVersion\": 38,\n  \"version\": 1,\n  \"refresh\": \"15s\",\n  \"time\": {\n    \"from\": \"now-1h\",\n    \"to\": \"now\"\n  },\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"datasource\",\n        \"type\": \"datasource\",\n        \"query\": \"prometheus\",\n        \"current\": {\n          \"text\": \"Thanos\",\n          \"value\": \"Thanos\"\n        },\n        \"hide\": 0,\n        \"label\": \"Datasource\",\n        \"refresh\": 1\n      },\n      {\n        \"name\": \"node_name\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"prometheus\",\n          \"uid\": \"${datasource}\"\n        },\n        \"query\": \"label_values(up{job=\\\"external-gpu-nodes\\\"}, instance)\",\n        \"label\": \"Node\",\n        \"multi\": false,\n        \"includeAll\": false,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1\n      },\n      {\n        \"name\": \"gpu_id\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"prometheus\",\n          \"uid\": \"${datasource}\"\n        },\n        \"query\": \"label_values(DCGM_FI_DEV_GPU_UTIL{instance=\\\"$node_name\\\"}, gpu)\",\n        \"label\": \"GPU ID\",\n        \"multi\": false,\n        \"includeAll\": false,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 3\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"id\": 70,\n      \"type\": \"gauge\",\n      \"title\": \"GPU 온도\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 0,\n        \"w\": 4,\n        \"h\": 6\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"celsius\",\n          \"min\": 0,\n          \"max\": 120,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 75\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 83\n              }\n            ]\n          }\n        }\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"showThresholdLabels\": false,\n        \"showThresholdMarkers\": true,\n        \"text\": {\n          \"valueSize\": 36\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_GPU_TEMP{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"GPU {{gpu}}\",\n          \"instant\": true\n        }\n      ]\n    },\n    {\n      \"id\": 71,\n      \"type\": \"gauge\",\n      \"title\": \"GPU 사용률\",\n      \"gridPos\": {\n        \"x\": 4,\n        \"y\": 0,\n        \"w\": 4,\n        \"h\": 6\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"min\": 0,\n          \"max\": 100,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 70\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 90\n              }\n            ]\n          }\n        }\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"showThresholdLabels\": false,\n        \"showThresholdMarkers\": true,\n        \"text\": {\n          \"valueSize\": 36\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_GPU_UTIL{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"GPU {{gpu}}\",\n          \"instant\": true\n        }\n      ]\n    },\n    {\n      \"id\": 72,\n      \"type\": \"gauge\",\n      \"title\": \"메모리 사용률\",\n      \"gridPos\": {\n        \"x\": 8,\n        \"y\": 0,\n        \"w\": 4,\n        \"h\": 6\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"min\": 0,\n          \"max\": 100,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 70\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 90\n              }\n            ]\n          }\n        }\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"showThresholdLabels\": false,\n        \"showThresholdMarkers\": true,\n        \"text\": {\n          \"valueSize\": 36\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_FB_USED{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"} / (DCGM_FI_DEV_FB_USED{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"} + DCGM_FI_DEV_FB_FREE{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}) * 100\",\n          \"legendFormat\": \"GPU {{gpu}}\",\n          \"instant\": true\n        }\n      ]\n    },\n    {\n      \"id\": 73,\n      \"type\": \"gauge\",\n      \"title\": \"전력 소모\",\n      \"gridPos\": {\n        \"x\": 12,\n        \"y\": 0,\n        \"w\": 4,\n        \"h\": 6\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"watt\",\n          \"min\": 0,\n          \"max\": 450,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 300\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 380\n              }\n            ]\n          }\n        }\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"showThresholdLabels\": false,\n        \"showThresholdMarkers\": true,\n        \"text\": {\n          \"valueSize\": 36\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_POWER_USAGE{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"GPU {{gpu}}\",\n          \"instant\": true\n        }\n      ]\n    },\n    {\n      \"id\": 74,\n      \"type\": \"stat\",\n      \"title\": \"XID 에러\",\n      \"gridPos\": {\n        \"x\": 16,\n        \"y\": 0,\n        \"w\": 4,\n        \"h\": 6\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 1\n              }\n            ]\n          },\n          \"mappings\": []\n        }\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"textMode\": \"auto\",\n        \"text\": {\n          \"valueSize\": 36\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_XID_ERRORS{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"XID\",\n          \"instant\": true\n        }\n      ]\n    },\n    {\n      \"id\": 75,\n      \"type\": \"stat\",\n      \"title\": \"ECC 에러\",\n      \"gridPos\": {\n        \"x\": 20,\n        \"y\": 0,\n        \"w\": 4,\n        \"h\": 6\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 1\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 1\n              }\n            ]\n          }\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"DBE\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"red\",\n                      \"value\": 1\n                    }\n                  ]\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"SBE\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 1\n                    }\n                  ]\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"textMode\": \"value_and_name\",\n        \"text\": {\n          \"valueSize\": 28\n        },\n        \"orientation\": \"horizontal\"\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_ECC_SBE_VOL{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"SBE\",\n          \"instant\": true\n        },\n        {\n          \"expr\": \"DCGM_FI_DEV_ECC_DBE_VOL{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"DBE\",\n          \"instant\": true\n        }\n      ]\n    },\n    {\n      \"id\": 10,\n      \"type\": \"row\",\n      \"title\": \"온도 (NVIDIA 제조사 임계치 적용)\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 6,\n        \"w\": 24,\n        \"h\": 1\n      },\n      \"collapsed\": false\n    },\n    {\n      \"id\": 11,\n      \"type\": \"timeseries\",\n      \"title\": \"GPU 온도  ·  임계: 75°C (경고) / 83°C (위험, 열 제한 시작)\",\n      \"description\": \"NVIDIA A100 TJmax=83°C 기준. 83°C 초과 시 thermal throttling 발생.\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 7,\n        \"w\": 8,\n        \"h\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"celsius\",\n          \"min\": 0,\n          \"max\": 100,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 75\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 83\n              }\n            ]\n          },\n          \"custom\": {\n            \"thresholdsStyle\": {\n              \"mode\": \"area\"\n            },\n            \"lineWidth\": 2,\n            \"fillOpacity\": 15\n          }\n        }\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"single\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_GPU_TEMP{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"GPU Temp\"\n        }\n      ]\n    },\n    {\n      \"id\": 12,\n      \"type\": \"timeseries\",\n      \"title\": \"메모리 온도  ·  임계: 85°C (경고) / 95°C (위험, HBM2e 한계)\",\n      \"description\": \"HBM2e 메모리 최대 권장 온도 95°C. A100 SXM 기준.\",\n      \"gridPos\": {\n        \"x\": 8,\n        \"y\": 7,\n        \"w\": 8,\n        \"h\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"celsius\",\n          \"min\": 0,\n          \"max\": 110,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 85\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 95\n              }\n            ]\n          },\n          \"custom\": {\n            \"thresholdsStyle\": {\n              \"mode\": \"area\"\n            },\n            \"lineWidth\": 2,\n            \"fillOpacity\": 15\n          }\n        }\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"single\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_MEMORY_TEMP{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"Memory Temp\"\n        }\n      ]\n    },\n    {\n      \"id\": 13,\n      \"type\": \"timeseries\",\n      \"title\": \"팬 속도 (%)  ·  임계: 80% (경고) / 90% (위험)\",\n      \"description\": \"DCGM_FI_DEV_FAN_SPEED. A100/H100 등 패시브 쿨링 GPU는 수집 불가(N/A). 수집 활성화는 scripts/enable-dcgm-fan-speed.sh 참조.\",\n      \"gridPos\": {\n        \"x\": 16,\n        \"y\": 7,\n        \"w\": 8,\n        \"h\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"min\": 0,\n          \"max\": 100,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 80\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 90\n              }\n            ]\n          },\n          \"custom\": {\n            \"thresholdsStyle\": {\n              \"mode\": \"area\"\n            },\n            \"lineWidth\": 2,\n            \"fillOpacity\": 15\n          }\n        }\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"single\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_FAN_SPEED{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"Fan Speed\"\n        }\n      ]\n    },\n    {\n      \"id\": 20,\n      \"type\": \"row\",\n      \"title\": \"전력 소모 및 위반\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 15,\n        \"w\": 24,\n        \"h\": 1\n      },\n      \"collapsed\": false\n    },\n    {\n      \"id\": 21,\n      \"type\": \"timeseries\",\n      \"title\": \"전력 소모 (W)  ·  임계: 300W (75% TDP) / 380W (95% TDP, A100 400W 기준)\",\n      \"description\": \"NVIDIA A100 SXM TDP=400W 기준. 380W 초과 시 power throttling 위험.\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 16,\n        \"w\": 12,\n        \"h\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"watt\",\n          \"min\": 0,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 300\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 380\n              }\n            ]\n          },\n          \"custom\": {\n            \"thresholdsStyle\": {\n              \"mode\": \"area\"\n            },\n            \"lineWidth\": 2,\n            \"fillOpacity\": 15\n          }\n        }\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_POWER_USAGE{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"Power Usage\"\n        },\n        {\n          \"expr\": \"DCGM_FI_DEV_ENFORCED_POWER_LIMIT{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"Power Limit (Enforced)\"\n        }\n      ]\n    },\n    {\n      \"id\": 22,\n      \"type\": \"timeseries\",\n      \"title\": \"Thermal·Power Violation 누적 시간 (μs)\",\n      \"description\": \"값이 증가할수록 GPU가 throttling 상태였음을 의미. 지속 증가 시 쿨링/전원 점검 필요.\",\n      \"gridPos\": {\n        \"x\": 12,\n        \"y\": 16,\n        \"w\": 12,\n        \"h\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"µs\",\n          \"min\": 0,\n          \"color\": {\n            \"mode\": \"palette-classic\"\n          },\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 10\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 1\n              }\n            ]\n          }\n        }\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"DCGM_FI_DEV_THERMAL_VIOLATION{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"Thermal Violation\"\n        },\n        {\n          \"expr\": \"DCGM_FI_DEV_POWER_VIOLATION{instance=\\\"$node_name\\\", gpu=\\\"$gpu_id\\\"}\",\n          \"legendFormat\": \"Power Violation\"\n        }\n      ]\n    },\n    {\n      \"id\": 30,\n      \"type\": \"row\",\n      \"title\": \"SM · 메모리 클럭 및 사용률\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 24,\n        \"w\": 24,\n        \"h\": 1\n      },\n      \"collapsed\": false\n    },\n    {\n      \"id\": 31,\n      \"type\": \"timeseries\",\n      \"title\": \"SM 클럭 · 메모리 클럭 (MHz)\",\n      \"description\": \"클럭 급락은 thermal/power throttling 징후. A100: SM boost ~1410MHz, Mem ~1215MHz.\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 25,\n        \"w\": 12,\n        \"h\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\