n          \"legendFormat\": \"Total {{device}}\", \n          \"refId\": \"A\"\n        }\n      ]\n    }, \n    {\n      \"id\": 14, \n      \"type\": \"timeseries\", \n      \"title\": \"Disk 사용량\", \n      \"gridPos\": {\n        \"x\": 12, \n        \"y\": 35, \n        \"w\": 12, \n        \"h\": 8\n      }, \n      \"datasource\": {\n        \"type\": \"prometheus\", \n        \"uid\": \"${datasource}\"\n      }, \n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"bytes\", \n          \"min\": 0, \n          \"color\": {\n            \"mode\": \"palette-classic\"\n          }\n        }\n      }, \n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        }\n      }, \n      \"targets\": [\n        {\n          \"refId\": \"A\", \n          \"expr\": \"sum(node_filesystem_size_bytes{instance=\\\"$node_name\\\", fstype=~\\\"ext4|xfs|btrfs|vfat\\\"} - node_filesystem_avail_bytes{instance=\\\"$node_name\\\", fstype=~\\\"ext4|xfs|btrfs|vfat\\\"})\", \n          \"legendFormat\": \"Used\"\n        }, \n        {\n          \"refId\": \"B\", \n          \"expr\": \"sum(node_filesystem_avail_bytes{instance=\\\"$node_name\\\", fstype=~\\\"ext4|xfs|btrfs|vfat\\\"})\", \n          \"legendFormat\": \"Available\"\n        }, \n        {\n          \"refId\": \"C\", \n          \"expr\": \"sum(node_filesystem_size_bytes{instance=\\\"$node_name\\\", fstype=~\\\"ext4|xfs|btrfs|vfat\\\"})\", \n          \"legendFormat\": \"Total\"\n        }\n      ]\n    }\n  ], \n  \"links\": [\n    {\n      \"title\": \"← Overview\", \n      \"type\": \"link\", \n      \"url\": \"/d/gpu-cluster-overview?var-datasource=${datasource}&${__url_time_range}\", \n      \"targetBlank\": false, \n      \"icon\": \"arrow-left\", \n      \"tooltip\": \"Cluster Multi-GPU Overview로 돌아가기\"\n    }\n  ]\n}"
