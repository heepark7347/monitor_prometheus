apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node-detail
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  node-detail.json: |
    {
      "title": "Node Detail",
      "uid": "node_detail",
      "tags": ["gpu", "node", "detail", "dcgm"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Thanos", "value": "Thanos" },
            "hide": 0,
            "label": "Datasource",
            "refresh": 1
          },
          {
            "name": "node_name",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "query": "label_values(up{job=\"external-gpu-nodes\"}, instance)",
            "label": "Node",
            "multi": false,
            "includeAll": false,
            "hide": 0,
            "refresh": 2,
            "sort": 1
          },
          {
            "name": "gpu_id",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "query": "label_values(DCGM_FI_DEV_GPU_TEMP{instance=\"$node_name\"}, gpu)",
            "label": "GPU ID",
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "current": { "text": "All", "value": "$__all" },
            "hide": 2,
            "refresh": 2,
            "sort": 3
          }
        ]
      },
      "panels": [

        {
          "id": 1,
          "type": "stat",
          "title": "노드 상태",
          "gridPos": { "x": 0, "y": 0, "w": 3, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",   "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red"   } } },
                { "type": "value", "options": { "1": { "text": "UP",   "color": "green" } } }
              ]
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "text": { "valueSize": 32 }
          },
          "targets": [
            {
              "expr": "up{job=\"external-gpu-nodes\", instance=\"$node_name\"}",
              "legendFormat": "Status",
              "instant": true
            }
          ]
        },

        {
          "id": 2,
          "type": "stat",
          "title": "GPU 수",
          "gridPos": { "x": 3, "y": 0, "w": 3, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "blue", "value": null } ] }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "text": { "valueSize": 40 }
          },
          "targets": [
            {
              "expr": "count(DCGM_FI_DEV_GPU_UTIL{instance=\"$node_name\"})",
              "legendFormat": "GPUs",
              "instant": true
            }
          ]
        },

        {
          "id": 3,
          "type": "stat",
          "title": "평균 GPU 사용률",
          "gridPos": { "x": 6, "y": 0, "w": 3, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red",    "value": 90 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto",
            "text": { "valueSize": 36 }
          },
          "targets": [
            {
              "expr": "avg(DCGM_FI_DEV_GPU_UTIL{instance=\"$node_name\"})",
              "legendFormat": "GPU Util",
              "instant": true
            }
          ]
        },

        {
          "id": 4,
          "type": "stat",
          "title": "평균 GPU 온도",
          "gridPos": { "x": 9, "y": 0, "w": 3, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 75 },
                  { "color": "red",    "value": 85 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto",
            "text": { "valueSize": 36 }
          },
          "targets": [
            {
              "expr": "avg(DCGM_FI_DEV_GPU_TEMP{instance=\"$node_name\"})",
              "legendFormat": "GPU Temp",
              "instant": true
            }
          ]
        },

        {
          "id": 5,
          "type": "stat",
          "title": "CPU 사용률",
          "gridPos": { "x": 12, "y": 0, "w": 3, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red",    "value": 90 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto",
            "text": { "valueSize": 36 }
          },
          "targets": [
            {
              "expr": "(1 - avg(rate(node_cpu_seconds_total{instance=\"$node_name\", mode=\"idle\"}[$__rate_interval]))) * 100",
              "legendFormat": "CPU",
              "instant": true
            }
          ]
        },

        {
          "id": 6,
          "type": "stat",
          "title": "메모리 사용률",
          "gridPos": { "x": 15, "y": 0, "w": 3, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red",    "value": 90 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto",
            "text": { "valueSize": 36 }
          },
          "targets": [
            {
              "expr": "(1 - node_memory_MemAvailable_bytes{instance=\"$node_name\"} / node_memory_MemTotal_bytes{instance=\"$node_name\"}) * 100",
              "legendFormat": "Memory",
              "instant": true
            }
          ]
        },

        {
          "id": 7,
          "type": "stat",
          "title": "평균 GPU 전력",
          "gridPos": { "x": 18, "y": 0, "w": 3, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 300 },
                  { "color": "red",    "value": 380 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto",
            "text": { "valueSize": 36 }
          },
          "targets": [
            {
              "expr": "avg(DCGM_FI_DEV_POWER_USAGE{instance=\"$node_name\"})",
              "legendFormat": "Power",
              "instant": true
            }
          ]
        },

        {
          "id": 8,
          "type": "stat",
          "title": "GPU 메모리 사용률",
          "gridPos": { "x": 21, "y": 0, "w": 3, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red",    "value": 90 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto",
            "text": { "valueSize": 36 }
          },
          "targets": [
            {
              "expr": "sum(DCGM_FI_DEV_FB_USED{instance=\"$node_name\"}) / (sum(DCGM_FI_DEV_FB_USED{instance=\"$node_name\"}) + sum(DCGM_FI_DEV_FB_FREE{instance=\"$node_name\"})) * 100",
              "legendFormat": "GPU Mem %",
              "instant": true
            }
          ]
        },

        {
          "id": 9,
          "type": "row",
          "title": "개별 GPU 상태",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 1 },
          "collapsed": false
        },

        {
          "id": 40,
          "type": "stat",
          "title": "개별 GPU 상태",
          "description": "GPU별 5개 지표(사용률·GPU온도·메모리온도·전력·XID에러) 종합 상태. 클릭 시 GPU Deep-Dive로 이동.",
          "gridPos": { "x": 0, "y": 5, "w": 3, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 4 },
                  { "color": "green",  "value": 5 }
                ]
              },
              "mappings": [
                {
                  "type": "range",
                  "options": {
                    "from": 0, "to": 3,
                    "result": { "text": "위험", "color": "red" }
                  }
                },
                {
                  "type": "value",
                  "options": {
                    "4": { "text": "경보", "color": "yellow" }
                  }
                },
                {
                  "type": "value",
                  "options": {
                    "5": { "text": "정상", "color": "green" }
                  }
                }
              ],
              "links": [
                {
                  "title": "GPU Deep-Dive →",
                  "url": "/d/gpu_detail?var-datasource=${datasource}&var-node_name=${node_name}&var-gpu_id=${__field.labels.gpu}&${__url_time_range}",
                  "targetBlank": false
                }
              ]
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "text": { "valueSize": 28 },
            "orientation": "auto"
          },
          "targets": [
            {
              "expr": "(\n  (DCGM_FI_DEV_GPU_UTIL{instance=\"$node_name\"}     < bool 90)\n+ (DCGM_FI_DEV_GPU_TEMP{instance=\"$node_name\"}     < bool 83)\n+ (DCGM_FI_DEV_MEMORY_TEMP{instance=\"$node_name\"} < bool 95)\n+ (DCGM_FI_DEV_POWER_USAGE{instance=\"$node_name\"} < bool 380)\n+ (DCGM_FI_DEV_XID_ERRORS{instance=\"$node_name\"} == bool 0)\n)",
              "legendFormat": "gpu{{gpu}}",
              "instant": true
            }
          ]
        },

        {
          "id": 10,
          "type": "row",
          "title": "시스템 리소스",
          "gridPos": { "x": 0, "y": 9, "w": 24, "h": 1 },
          "collapsed": false
        },

        {
          "id": 11,
          "type": "timeseries",
          "title": "CPU 사용률 (코어별)",
          "gridPos": { "x": 0, "y": 10, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "palette-classic" }
            }
          },
          "options": { "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            {
              "expr": "(1 - rate(node_cpu_seconds_total{instance=\"$node_name\", mode=\"idle\"}[$__rate_interval])) * 100",
              "legendFormat": "Core {{cpu}}"
            }
          ]
        },

        {
          "id": 12,
          "type": "timeseries",
          "title": "메모리 사용량",
          "gridPos": { "x": 12, "y": 10, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "min": 0,
              "color": { "mode": "palette-classic" }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "node_memory_MemTotal_bytes{instance=\"$node_name\"} - node_memory_MemAvailable_bytes{instance=\"$node_name\"}",
              "legendFormat": "Used"
            },
            {
              "expr": "node_memory_MemAvailable_bytes{instance=\"$node_name\"}",
              "legendFormat": "Available"
            },
            {
              "expr": "node_memory_Buffers_bytes{instance=\"$node_name\"} + node_memory_Cached_bytes{instance=\"$node_name\"}",
              "legendFormat": "Buffers+Cache"
            }
          ]
        },

        {
          "id": 13,
          "type": "timeseries",
          "title": "네트워크 I/O",
          "gridPos": { "x": 0, "y": 18, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "color": { "mode": "palette-classic" }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{instance=\"$node_name\", device!~\"lo|veth.*\"}[$__rate_interval]) * 8",
              "legendFormat": "RX {{device}}"
            },
            {
              "expr": "rate(node_network_transmit_bytes_total{instance=\"$node_name\", device!~\"lo|veth.*\"}[$__rate_interval]) * 8",
              "legendFormat": "TX {{device}}"
            }
          ]
        },

        {
          "id": 14,
          "type": "timeseries",
          "title": "디스크 I/O",
          "gridPos": { "x": 12, "y": 18, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "color": { "mode": "palette-classic" }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "rate(node_disk_read_bytes_total{instance=\"$node_name\", device!~\"dm-.*\"}[$__rate_interval])",
              "legendFormat": "Read {{device}}"
            },
            {
              "expr": "rate(node_disk_written_bytes_total{instance=\"$node_name\", device!~\"dm-.*\"}[$__rate_interval])",
              "legendFormat": "Write {{device}}"
            }
          ]
        },

        {
          "id": 20,
          "type": "row",
          "title": "GPU Sensors — GPU $gpu_id ($node_name)",
          "gridPos": { "x": 0, "y": 26, "w": 24, "h": 1 },
          "collapsed": false,
          "repeat": "gpu_id",
          "repeatDirection": "v"
        },

        {
          "id": 21,
          "type": "gauge",
          "title": "온도 — GPU $gpu_id",
          "description": "GPU $gpu_id 실시간 온도. 클릭 시 GPU 상세 대시보드로 이동.",
          "gridPos": { "x": 0, "y": 27, "w": 6, "h": 6 },
          "repeat": "gpu_id",
          "repeatDirection": "h",
          "maxPerRow": 4,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "min": 0,
              "max": 100,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 75 },
                  { "color": "red",    "value": 85 }
                ]
              },
              "links": [
                {
                  "title": "GPU $gpu_id 상세 →",
                  "url": "/d/gpu_detail?var-node_name=${node_name}&var-gpu_id=${gpu_id}&${__url_time_range}",
                  "targetBlank": false
                }
              ]
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "text": { "valueSize": 28 }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_TEMP{instance=\"$node_name\", gpu=\"$gpu_id\"}",
              "legendFormat": "GPU {{gpu}} Temp",
              "instant": true
            }
          ]
        },

        {
          "id": 22,
          "type": "gauge",
          "title": "사용률 — GPU $gpu_id",
          "description": "GPU $gpu_id 실시간 Utilization. 클릭 시 GPU 상세 대시보드로 이동.",
          "gridPos": { "x": 6, "y": 27, "w": 6, "h": 6 },
          "repeat": "gpu_id",
          "repeatDirection": "h",
          "maxPerRow": 4,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red",    "value": 90 }
                ]
              },
              "links": [
                {
                  "title": "GPU $gpu_id 상세 →",
                  "url": "/d/gpu_detail?var-node_name=${node_name}&var-gpu_id=${gpu_id}&${__url_time_range}",
                  "targetBlank": false
                }
              ]
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "text": { "valueSize": 28 }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL{instance=\"$node_name\", gpu=\"$gpu_id\"}",
              "legendFormat": "GPU {{gpu}} Util",
              "instant": true
            }
          ]
        },

        {
          "id": 23,
          "type": "gauge",
          "title": "메모리 사용률 — GPU $gpu_id",
          "description": "GPU $gpu_id 메모리 사용 비율. 클릭 시 GPU 상세 대시보드로 이동.",
          "gridPos": { "x": 12, "y": 27, "w": 6, "h": 6 },
          "repeat": "gpu_id",
          "repeatDirection": "h",
          "maxPerRow": 4,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red",    "value": 90 }
                ]
              },
              "links": [
                {
                  "title": "GPU $gpu_id 상세 →",
                  "url": "/d/gpu_detail?var-node_name=${node_name}&var-gpu_id=${gpu_id}&${__url_time_range}",
                  "targetBlank": false
                }
              ]
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "text": { "valueSize": 28 }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED{instance=\"$node_name\", gpu=\"$gpu_id\"} / (DCGM_FI_DEV_FB_USED{instance=\"$node_name\", gpu=\"$gpu_id\"} + DCGM_FI_DEV_FB_FREE{instance=\"$node_name\", gpu=\"$gpu_id\"}) * 100",
              "legendFormat": "GPU {{gpu}} Mem %",
              "instant": true
            }
          ]
        },

        {
          "id": 24,
          "type": "gauge",
          "title": "전력 소모 — GPU $gpu_id",
          "description": "GPU $gpu_id 실시간 전력 소모. 클릭 시 GPU 상세 대시보드로 이동.",
          "gridPos": { "x": 18, "y": 27, "w": 6, "h": 6 },
          "repeat": "gpu_id",
          "repeatDirection": "h",
          "maxPerRow": 4,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "min": 0,
              "max": 450,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 300 },
                  { "color": "red",    "value": 380 }
                ]
              },
              "links": [
                {
                  "title": "GPU $gpu_id 상세 →",
                  "url": "/d/gpu_detail?var-node_name=${node_name}&var-gpu_id=${gpu_id}&${__url_time_range}",
                  "targetBlank": false
                }
              ]
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "text": { "valueSize": 28 }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE{instance=\"$node_name\", gpu=\"$gpu_id\"}",
