pe\": \"prometheus\", \n        \"uid\": \"${datasource}\"\n      }, \n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\", \n          \"color\": {\n            \"mode\": \"thresholds\"\n          }, \n          \"thresholds\": {\n            \"mode\": \"absolute\", \n            \"steps\": [\n              {\n                \"color\": \"red\", \n                \"value\": null\n              }, \n              {\n                \"color\": \"green\", \n                \"value\": 1\n              }\n            ]\n          }, \n          \"mappings\": [\n            {\n              \"type\": \"value\", \n              \"options\": {\n                \"0\": {\n                  \"text\": \"DOWN\", \n                  \"color\": \"red\"\n                }\n              }\n            }, \n            {\n              \"type\": \"value\", \n              \"options\": {\n                \"1\": {\n                  \"text\": \"UP\", \n                  \"color\": \"green\"\n                }\n              }\n            }\n          ]\n        }\n      }, \n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        }, \n        \"colorMode\": \"background\", \n        \"graphMode\": \"none\", \n        \"textMode\": \"auto\", \n        \"text\": {\n          \"valueSize\": 32\n        }\n      }, \n      \"targets\": [\n        {\n          \"expr\": \"up{job=\\\"external-gpu-nodes\\\", instance=\\\"$node_name\\\"}\", \n          \"legendFormat\": \"Status\", \n          \"instant\": true\n        }\n      ]\n    }, \n    {\n      \"id\": 2, \n      \"type\": \"stat\", \n      \"title\": \"GPU 수\", \n      \"gridPos\": {\n        \"x\": 3, \n        \"y\": 0, \n        \"w\": 3, \n        \"h\": 4\n      }, \n      \"datasource\": {\n        \"type\": \"prometheus\", \n        \"uid\": \"${datasource}\"\n      }, \n      \"fieldConfig\": {\n        \"defaults\": {\n     