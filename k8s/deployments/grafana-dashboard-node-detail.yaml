\": null\n              }, \n              {\n                \"color\": \"yellow\", \n                \"value\": 70\n              }, \n              {\n                \"color\": \"red\", \n                \"value\": 90\n              }\n            ]\n          }\n        }\n      }, \n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        }, \n        \"colorMode\": \"background\", \n        \"graphMode\": \"area\", \n        \"textMode\": \"auto\", \n        \"text\": {\n          \"valueSize\": 36\n        }\n      }, \n      \"targets\": [\n        {\n          \"expr\": \"(1 - node_memory_MemAvailable_bytes{instance=\\\"$node_name\\\"} / node_memory_MemTotal_bytes{instance=\\\"$node_name\\\"}) * 100\", \n          \"legendFormat\": \"Memory\", \n          \"instant\": true\n        }\n      ]\n    }, \n    {\n      \"id\": 7, \n      \"type\": \"stat\", \n      \"title\": \"평균 GPU 전력\", \n      \"gridPos\": {\n        \"x\": 18, \n        \"y\": 0, \n        \"w\": 3, \n        \"h\": 4\n      }, \n      \"datasource\": {\n        \"type\": \"prometheus\", \n        \"uid\": \"${datasource}\"\n      }, \n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"watt\", \n          \"color\": {\n            \"mode\": \"thresholds\"\n          }, \n          \"thresholds\": {\n            \"mode\": \"absolute\", \n            \"steps\": [\n              {\n                \"color\": \"green\", \n                \"value\": null\n              }, \n              {\n                \"color\": \"yellow\", \n                \"value\": 300\n              }, \n              {\n                \"color\": \"red\", \n                \"value\": 380\n              }\n            ]\n          }\n        }\n      }, \n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        }, \n        \"colorMode\": \"background\", \n  