apiVersion: v1
data:
  gpu-cluster-overview.json: |
    {
      "title": "Cluster Multi-GPU Overview",
      "uid": "gpu-cluster-overview",
      "tags": [
        "gpu",
        "cluster",
        "overview",
        "dcgm",
        "external"
      ],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 12,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Thanos",
              "value": "Thanos"
            },
            "hide": 0,
            "label": "Datasource",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "활성 노드",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "text": {
              "valueSize": 40
            }
          },
          "targets": [
            {
              "expr": "count(up{job=\"external-gpu-nodes\"}== 1) OR vector(0)",
              "legendFormat": "Active",
              "instant": true
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "장애 노드",
          "gridPos": {
            "x": 4,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 2
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "text": {
              "valueSize": 40
            }
          },
          "targets": [
            {
              "expr": "sum(up{job=\"external-gpu-nodes\"} == 0) OR vector(0)",
              "legendFormat": "Failed",
              "instant": true
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "전체 GPU 수",
          "gridPos": {
            "x": 8,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "text": {
              "valueSize": 40
            }
          },
          "targets": [
            {
              "expr": "count(DCGM_FI_DEV_GPU_UTIL{group=\"external-gpu\",instance!~\".+:[0-9]+\"})",
              "instant": true
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "전체 노드 정보",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 24,
            "h": 1
          },
          "collapsed": false
        },
        {
          "id": 11,
          "type": "table",
          "title": "노드 정보(노드명 클릭 → Node Detail)",
          "description": "노드명 클릭 시 즉시Node Detail 이동. 주황≥80% / 빨강≥90%",
          "gridPos": {
            "x": 0,
            "y": 5,
            "w": 24,
            "h": 14
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "decimals": 1,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              },
              "custom": {
                "align": "auto",
                "displayMode": "gradient-gauge",
                "minWidth": 150
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "노드명"
                },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "auto"
                  },
                  {
                    "id": "custom.align",
                    "value": "left"
                  },
                  {
                    "id": "custom.width",
                    "value": 200
                  },
                  {
                    "id": "custom.pinned",
                    "value": "left"
                  },
                  {
                    "id": "unit",
                    "value": "string"
                  },
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "",
                        "url": "/d/node_detail?var-datasource=${datasource}&var-node_name=${__data.fields.노드명}&${__url_time_range}",
                        "targetBlank": false
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Value 6"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "장비 상태"
                  },
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background",
                      "mode": "solid"
                    }
                  },
                  {
                    "id": "custom.align",
                    "value": "center"
                  },
                  {
                    "id": "color",
                    "value": {
                      "mode": "thresholds"
                    }
                  },
                  {
                    "id": "custom.width",
                    "value": 100
                  },
                  {
                    "id": "unit",
                    "value": "short"
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "red",
                          "value": null
                        },
                        {
                          "color": "green",
                          "value": 1
                        }
                      ]
                    }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "0": {
                            "text": "DOWN",
                            "color": "red",
                            "index": 0
                          },
                          "1": {
                            "text": "UP",
                            "color": "green",
                            "index": 1
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Value 6",
                "desc": false
              }
            ],
            "footer": {
              "show": false
            }
          },
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            },
            {
              "id": "joinByField",
              "options": {
                "byField": "instance",
                "mode": "outer"
              }
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "instance": "노드명",
                  "Value 1": "CPU 사용률",
                  "Value 2": "Memory 사용률",
                  "Value 3": "평균 GPU 사용률",
                  "Value 4": "GPU 메모리 사용률",
                  "Value 5": "디스크 사용률"
                },
                "indexByName": {
                  "instance": 0,
                  "Value 6": 1,
                  "Value 1": 2,
                  "Value 2": 3,
                  "Value 3": 4,
                  "Value 4": 5,
                  "Value 5": 6
                },
                "excludeByName": {
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true,
                  "Time 3": true,
                  "Time 4": true,
                  "Time 5": true,
                  "Time 6": true,
                  "job": true,
                  "group": true
                }
              }
            }
          ],
          "targets": [
            {
              "refId": "CPU",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(((1-avg by(instance)(rate(node_cpu_seconds_total{job=\"external-gpu-nodes\",mode=\"idle\"}[10m])))*100) OR (avg by(instance)(up{job=\"external-gpu-nodes\"})*0),\"instance\",\"$1\",\"instance\",\"(.+):[0-9]+\")"
            },
            {
              "refId": "MEM",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(avg by(instance)((1-node_memory_MemAvailable_bytes{job=\"external-gpu-nodes\"}/node_memory_MemTotal_bytes{job=\"external-gpu-nodes\"}))*100,\"instance\",\"$1\",\"instance\",\"(.+):[0-9]+\")"
            },
            {
              "refId": "GPU_UTIL",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "avg by(instance)(DCGM_FI_DEV_GPU_UTIL{group=\"external-gpu\",instance!~\".+:[0-9]+\"})"
            },
            {
              "refId": "GPU_MEM",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "sum by(instance)(DCGM_FI_DEV_FB_USED{group=\"external-gpu\",instance!~\".+:[0-9]+\"})/(sum by(instance)(DCGM_FI_DEV_FB_USED{group=\"external-gpu\",instance!~\".+:[0-9]+\"})+sum by(instance)(DCGM_FI_DEV_FB_FREE{group=\"external-gpu\",instance!~\".+:[0-9]+\"}))*100"
            },
            {
              "refId": "DISK",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace((1-sum by(instance)(node_filesystem_avail_bytes{job=\"external-gpu-nodes\",fstype=~\"ext4|xfs|btrfs|vfat\"})/sum by(instance)(node_filesystem_size_bytes{job=\"external-gpu-nodes\",fstype=~\"ext4|xfs|btrfs|vfat\"}))*100,\"instance\",\"$1\",\"instance\",\"(.+):[0-9]+\")"
            },
            {
              "refId": "STATUS",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "max by(instance)(label_replace(up{job=\"external-gpu-nodes\"}, \"instance\", \"$1\", \"instance\", \"(.+):[0-9]+\"))"
            }
          ]
        }
      ]
    }

kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-gpu-cluster-overview
  namespace: monitoring
