apiVersion: v1
data:
  gpu-cluster-overview.json: |
    {
      "title": "Cluster Multi-GPU Overview",
      "uid": "gpu-cluster-overview",
      "tags": [
        "gpu",
        "cluster",
        "overview",
        "dcgm",
        "external"
      ],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 31,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Thanos",
              "value": "Thanos"
            },
            "hide": 0,
            "label": "Datasource",
            "refresh": 1
          },
          {
            "name": "loki_datasource",
            "type": "datasource",
            "query": "loki",
            "current": {},
            "hide": 0,
            "label": "Loki",
            "refresh": 1
          },
          {
            "name": "host",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "${loki_datasource}"
            },
            "query": {
              "label": "host",
              "refId": "StandardVariableQuery",
              "stream": "",
              "type": 1
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": false,
            "hide": 0,
            "label": "서버",
            "options": [],
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "활성 노드",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 4,
            "h": 3
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "text": {
              "valueSize": 40
            }
          },
          "targets": [
            {
              "expr": "count(up{job=\"external-gpu-nodes\"}== 1) OR vector(0)",
              "legendFormat": "Active",
              "instant": true
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "장애 노드",
          "gridPos": {
            "x": 4,
            "y": 0,
            "w": 4,
            "h": 3
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 2
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "text": {
              "valueSize": 40
            }
          },
          "targets": [
            {
              "expr": "sum(up{job=\"external-gpu-nodes\"} == 0) OR vector(0)",
              "legendFormat": "Failed",
              "instant": true
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "전체 GPU 수",
          "gridPos": {
            "x": 8,
            "y": 0,
            "w": 4,
            "h": 3
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "text": {
              "valueSize": 40
            }
          },
          "targets": [
            {
              "expr": "count(DCGM_FI_DEV_GPU_UTIL{group=\"external-gpu\",instance!~\".+:[0-9]+\"})",
              "instant": true
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "전체 노드 정보",
          "gridPos": {
            "x": 0,
            "y": 3,
            "w": 24,
            "h": 1
          },
          "collapsed": false
        },
        {
          "id": 11,
          "type": "table",
          "title": "노드 정보(노드명 클릭 → Node Detail)",
          "description": "노드명 클릭 시 즉시Node Detail 이동. 주황≥80% / 빨강≥90%",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 24,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "decimals": 1,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              },
              "custom": {
                "align": "auto",
                "displayMode": "gradient-gauge",
                "minWidth": 150
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "노드명"
                },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "auto"
                  },
                  {
                    "id": "custom.align",
                    "value": "left"
                  },
                  {
                    "id": "custom.width",
                    "value": 200
                  },
                  {
                    "id": "custom.pinned",
                    "value": "left"
                  },
                  {
                    "id": "unit",
                    "value": "string"
                  },
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "",
                        "url": "/d/node_detail?var-datasource=${datasource}&var-node_name=${__data.fields.노드명}&${__url_time_range}",
                        "targetBlank": false
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "장비 상태"
                },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-text"
                  },
                  {
                    "id": "custom.align",
                    "value": "center"
                  },
                  {
                    "id": "custom.width",
                    "value": 100
                  },
                  {
                    "id": "unit",
                    "value": "none"
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "red",
                          "value": null
                        },
                        {
                          "color": "green",
                          "value": 1
                        }
                      ]
                    }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "range",
                        "options": {
                          "from": 0,
                          "to": 0.9,
                          "result": {
                            "text": "DOWN",
                            "color": "red",
                            "index": 0
                          }
                        }
                      },
                      {
                        "type": "range",
                        "options": {
                          "from": 1,
                          "to": 1,
                          "result": {
                            "text": "UP",
                            "color": "green",
                            "index": 1
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "장비 상태",
                "desc": false
              }
            ],
            "footer": {
              "show": false
            }
          },
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            },
            {
              "id": "joinByField",
              "options": {
                "byField": "instance",
                "mode": "outer"
              }
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "instance": "노드명",
                  "Value 1": "CPU 사용률",
                  "Value 2": "Memory 사용률",
                  "Value 3": "평균 GPU 사용률",
                  "Value 4": "GPU 메모리 사용률",
                  "Value 5": "디스크 사용률",
                  "Value 6": "장비 상태"
                },
                "indexByName": {
                  "instance": 0,
                  "Value 1": 1,
                  "Value 2": 2,
                  "Value 3": 3,
                  "Value 4": 4,
                  "Value 5": 5,
                  "Value 6": 6
                },
                "excludeByName": {
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true,
                  "Time 3": true,
                  "Time 4": true,
                  "Time 5": true,
                  "Time 6": true,
                  "job": true,
                  "group": true
                }
              }
            }
          ],
          "targets": [
            {
              "refId": "CPU",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(((1-avg by(instance)(rate(node_cpu_seconds_total{job=\"external-gpu-nodes\",mode=\"idle\"}[10m])))*100) OR (avg by(instance)(up{job=\"external-gpu-nodes\"})*0),\"instance\",\"$1\",\"instance\",\"(.+):[0-9]+\")"
            },
            {
              "refId": "MEM",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(avg by(instance)((1-node_memory_MemAvailable_bytes{job=\"external-gpu-nodes\"}/node_memory_MemTotal_bytes{job=\"external-gpu-nodes\"}))*100,\"instance\",\"$1\",\"instance\",\"(.+):[0-9]+\")"
            },
            {
              "refId": "GPU_UTIL",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "avg by(instance)(DCGM_FI_DEV_GPU_UTIL{group=\"external-gpu\",instance!~\".+:[0-9]+\"})"
            },
            {
              "refId": "GPU_MEM",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "sum by(instance)(DCGM_FI_DEV_FB_USED{group=\"external-gpu\",instance!~\".+:[0-9]+\"})/(sum by(instance)(DCGM_FI_DEV_FB_USED{group=\"external-gpu\",instance!~\".+:[0-9]+\"})+sum by(instance)(DCGM_FI_DEV_FB_FREE{group=\"external-gpu\",instance!~\".+:[0-9]+\"}))*100"
            },
            {
              "refId": "DISK",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace((1-sum by(instance)(node_filesystem_avail_bytes{job=\"external-gpu-nodes\",fstype=~\"ext4|xfs|btrfs|vfat\"})/sum by(instance)(node_filesystem_size_bytes{job=\"external-gpu-nodes\",fstype=~\"ext4|xfs|btrfs|vfat\"}))*100,\"instance\",\"$1\",\"instance\",\"(.+):[0-9]+\")"
            },
            {
              "refId": "STATUS",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "max by(instance)(label_replace(up{job=\"external-gpu-nodes\"}, \"instance\", \"$1\", \"instance\", \"(.+):[0-9]+\"))"
            }
          ]
        },
        {
          "id": 20,
          "type": "row",
          "title": "에러 로그 (GPU 서버)",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 24,
            "h": 1
          },
          "collapsed": false
        },
        {
          "id": 21,
          "type": "table",
          "title": "에러 / 경고 로그 실시간",
          "description": "GPU 서버 Promtail 수집 로그. 상단 '서버' 변수로 특정 호스트 필터링.",
          "gridPos": {
            "x": 0,
            "y": 13,
            "w": 24,
            "h": 10
          },
          "datasource": {
            "type": "loki",
            "uid": "${loki_datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "loki",
                "uid": "${loki_datasource}"
              },
              "expr": "{job=~\"varlogs|systemd-journal|dcgm-exporter\", host=~\"${host}\"} |~ \"(?i)(error|fatal|critical|warn|aborting)\" | regexp \"(?P<level>ERROR|WARN|WARNING|FATAL|CRITICAL|ABORT|ABORTING|error|warn|warning|fatal|critical|abort|aborting)\" | label_format node_ip=\"{{.instance}}\"",
              "queryType": "range",
              "legendFormat": "",
              "maxLines": 500
            }
          ],
          "transformations": [
            {
              "id": "extractFields",
              "options": {
                "source": "labels",
                "format": "json",
                "replace": false
              }
            },
            {
              "id": "filterFieldsByName",
              "options": {
                "include": {
                  "names": [
                    "Time",
                    "host",
                    "filename",
                    "level",
                    "node_ip",
                    "Line"
                  ]
                }
              }
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "Time": "시간",
                  "host": "대상 서버",
                  "filename": "로그 경로",
                  "level": "레벨",
                  "Line": "로그 상세",
                  "node_ip": "node_ip"
                },
                "indexByName": {
                  "Time": 0,
                  "host": 1,
                  "filename": 2,
                  "level": 3,
                  "Line": 5,
                  "node_ip": 4
                },
                "excludeByName": {}
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "left",
                "minWidth": 80,
                "wrap": true,
                "cellOptions": {
                  "type": "auto",
                  "wrapText": true
                }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "transparent",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 2
                  }
                ]
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "시간"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 175
                  },
                  {
                    "id": "custom.align",
                    "value": "center"
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "auto",
                      "wrapText": true
                    }
                  },
                  {
                    "id": "custom.wrap",
                    "value": true
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "대상 서버"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 150
                  },
                  {
                    "id": "custom.align",
                    "value": "center"
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "auto",
                      "wrapText": true
                    }
                  },
                  {
                    "id": "custom.wrap",
                    "value": true
                  },
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "Node Detail",
                        "url": "/d/node_detail?var-datasource=${datasource}&var-node_name=${__data.fields.node_ip}&${__url_time_range}",
                        "targetBlank": false
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "로그 경로"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 230
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "auto",
                      "wrapText": true
                    }
                  },
                  {
                    "id": "custom.wrap",
                    "value": true
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "레벨"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 90
                  },
                  {
                    "id": "custom.align",
                    "value": "center"
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background",
                      "wrapText": true
                    }
                  },
                  {
                    "id": "custom.wrap",
                    "value": true
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "FATAL": {
                            "text": "FATAL",
                            "color": "dark-red",
                            "index": 0
                          },
                          "fatal": {
                            "text": "FATAL",
                            "color": "dark-red",
                            "index": 1
                          },
                          "CRITICAL": {
                            "text": "CRITICAL",
                            "color": "dark-red",
                            "index": 2
                          },
                          "critical": {
                            "text": "CRITICAL",
                            "color": "dark-red",
                            "index": 3
                          },
                          "ABORT": {
                            "text": "ABORT",
                            "color": "dark-red",
                            "index": 4
                          },
                          "abort": {
                            "text": "ABORT",
                            "color": "dark-red",
                            "index": 5
                          },
                          "ABORTING": {
                            "text": "ABORT",
                            "color": "dark-red",
                            "index": 6
                          },
                          "aborting": {
                            "text": "ABORT",
                            "color": "dark-red",
                            "index": 7
                          },
                          "ERROR": {
                            "text": "ERROR",
                            "color": "red",
                            "index": 8
                          },
                          "error": {
                            "text": "ERROR",
                            "color": "red",
                            "index": 9
                          },
                          "WARNING": {
                            "text": "WARN",
                            "color": "orange",
                            "index": 10
                          },
                          "warning": {
                            "text": "WARN",
                            "color": "orange",
                            "index": 11
                          },
                          "WARN": {
                            "text": "WARN",
                            "color": "orange",
                            "index": 12
                          },
                          "warn": {
                            "text": "WARN",
                            "color": "orange",
                            "index": 13
                          }
                        }
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "로그 상세"
                },
                "properties": [
                  {
                    "id": "custom.minWidth",
                    "value": 600
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "auto",
                      "wrapText": true
                    }
                  },
                  {
                    "id": "custom.wrap",
                    "value": true
                  }
                ]
              }
            ]
          },
          "options": {
            "frameIndex": 0,
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "시간",
                "desc": true
              }
            ],
            "footer": {
              "show": false
            },
            "cellHeight": "lg"
          }
        }
      ]
    }

kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-gpu-cluster-overview
  namespace: monitoring
