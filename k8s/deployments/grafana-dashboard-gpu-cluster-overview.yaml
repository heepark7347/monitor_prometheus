apiVersion: v1
data:
  gpu-cluster-overview.json: "{\n  \"title\": \"Cluster Multi-GPU Overview\", \n  \"uid\": \"gpu-cluster-overview\", \n  \"tags\": [\n    \"gpu\", \n    \"cluster\", \n    \"overview\", \n    \"dcgm\", \n    \"external\"\n  ], \n  \"timezone\": \"browser\", \n  \"schemaVersion\": 38, \n  \"version\": 1, \n  \"refresh\": \"30s\", \n  \"time\": {\n    \"from\": \"now-1h\", \n    \"to\": \"now\"\n  }, \n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"datasource\", \n        \"type\": \"datasource\", \n        \"query\": \"prometheus\", \n        \"current\": {\n          \"text\": \"Thanos\", \n          \"value\": \"Thanos\"\n        }, \n        \"hide\": 0, \n        \"label\": \"Datasource\", \n        \"refresh\": 1\n      }, \n      {\n        \"name\": \"node\", \n        \"type\": \"query\", \n        \"datasource\": {\n          \"type\": \"prometheus\", \n          \"uid\": \"${datasource}\"\n        }, \n        \"query\": \"label_values(up{group=\\\"external-gpu\\\"}, server)\", \n        \"label\": \"Node\", \n        \"multi\": true, \n        \"includeAll\": true, \n        \"allValue\": \".*\", \n        \"current\": {\n          \"text\": \"All\", \n          \"value\": \"$__all\"\n        }, \n        \"hide\": 0, \n        \"refresh\": 2, \n        \"sort\": 1\n      }\n    ]\n  }, \n  \"panels\": [\n    {\n      \"id\": 1, \n      \"type\": \"stat\", \n      \"title\": \"활성 노드\", \n      \"description\": \"현재 up 상태인 GPU 노드 수\", \n      \"gridPos\": {\n        \"x\": 0, \n        \"y\": 0, \n        \"w\": 4, \n        \"h\": 4\n      }, \n      \"datasource\": {\n        \"type\": \"prometheus\", \n        \"uid\": \"${datasource}\"\n      }, \n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\", \n          \"color\": {\n            \"mode\": \"thresholds\"\n          }, \n          \"thresholds\": {\n            \"mode\": \"absolute\", \n            \"steps\": [\n              {\n                \"color\": \"red\", \n                \"value\": null\n              }, \n              {\n                \"color\": \"green\", \n                \"value\": 1\n              }\n            ]\n          }\n        }\n      }, \n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        }, \n        \"colorMode\": \"background\", \n        \"graphMode\": \"none\", \n        \"textMode\": \"auto\", \n        \"text\": {\n          \"valueSize\": 40\n        }\n      }, \n      \"targets\": [\n        {\n          \"expr\": \"count(up{job=\\\"external-gpu-nodes\\\"} == 1) OR vector(0)\", \n          \"legendFormat\": \"Active\", \n          \"instant\": true\n        }\n      ]\n    }, \n    {\n      \"id\": 2, \n      \"type\": \"stat\", \n      \"title\": \"장애 노드\", \n      \"description\": \"현재 down 상태인 GPU 노드 수\", \n      \"gridPos\": {\n        \"x\": 4, \n        \"y\": 0, \n        \"w\": 4, \n        \"h\": 4\n      }, \n      \"datasource\": {\n        \"type\": \"prometheus\", \n        \"uid\": \"${datasource}\"\n      }, \n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\", \n          \"color\": {\n            \"mode\": \"thresholds\"\n          }, \n          \"thresholds\": {\n            \"mode\": \"absolute\", \n            \"steps\": [\n              {\n                \"color\": \"green\", \n                \"value\": null\n              }, \n              {\n                \"color\": \"yellow\", \n                \"value\": 1\n              }, \n              {\n                \"color\": \"red\", \n                \"value\": 2\n              }\n            ]\n          }\n        }\n      }, \n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        }, \n        \"colorMode\": \"background\", \n        \"graphMode\": \"none\", \n        \"textMode\": \"auto\", \n        \"text\": {\n          \"valueSize\": 40\n        }\n      }, \n      \"targets\": [\n        {\n          \"expr\": \"sum(up{job=\\\"external-gpu-nodes\\\"} == 0) OR vector(0)\", \n          \"legendFormat\": \"Failed\", \n          \"instant\": true\n        }\n      ]\n    }, \n    {\n      \"id\": 10, \n      \"type\": \"row\", \n      \"title\": \"노드 상태 타임라인\", \n      \"gridPos\": {\n        \"x\": 0, \n        \"y\": 4, \n        \"w\": 24, \n        \"h\": 1\n      }, \n      \"collapsed\": false\n    }, \n    {\n      \"id\": 11, \n      \"type\": \"state-timeline\", \n      \"title\": \"노드 Up/Down 상태 (노드 수에 따라 행 자동 증가)\", \n      \"description\": \"노드가 추가될수록 행이 자동으로 늘어납니다. 노드 이름 클릭 시 상세 대시보드로 이동합니다.\", \n      \"gridPos\": {\n        \"x\": 0, \n        \"y\": 5, \n        \"w\": 24, \n        \"h\": 8\n      }, \n      \"datasource\": {\n        \"type\": \"prometheus\", \n        \"uid\": \"${datasource}\"\n      }, \n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          }, \n          \"thresholds\": {\n            \"mode\": \"absolute\", \n            \"steps\": [\n              {\n                \"color\": \"red\", \n                \"value\": null\n              }, \n              {\n                \"color\": \"green\", \n                \"value\": 1\n              }\n            ]\n          }, \n          \"custom\": {\n            \"lineWidth\": 0, \n            \"fillOpacity\": 90, \n            \"spanNulls\": false\n          }, \n          \"mappings\": [\n            {\n              \"type\": \"value\", \n              \"options\": {\n                \"0\": {\n                  \"text\": \"DOWN\", \n                  \"color\": \"red\"\n                }\n              }\n            }, \n            {\n              \"type\": \"value\", \n              \"options\": {\n                \"1\": {\n                  \"text\": \"UP\", \n                  \"color\": \"green\"\n                }\n              }\n            }\n          ], \n          \"links\": [\n            {\n              \"title\": \"노드 상세 대시보드 →\", \n              \"url\": \"/d/node_detail?var-node=${__field.labels.server}&${__url_time_range}\", \n              \"targetBlank\": false\n            }\n          ]\n        }\n      }, \n      \"options\": {\n        \"mergeValues\": true, \n        \"showValue\": \"auto\", \n        \"alignValue\": \"center\", \n        \"rowHeight\": 0.9, \n        \"legend\": {\n          \"displayMode\": \"list\", \n          \"placement\": \"bottom\"\n        }, \n        \"tooltip\": {\n          \"mode\": \"single\"\n        }\n      }, \n      \"targets\": [\n        {\n          \"expr\": \"up{job=\\\"external-gpu-nodes\\\"}\", \n          \"legendFormat\": \"{{server}}\", \n          \"instant\": false\n        }\n      ]\n    }\n  ]\n}"
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-gpu-cluster-overview
  namespace: monitoring
