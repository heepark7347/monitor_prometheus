apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-gpu-cluster-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  gpu-cluster-overview.json: |
    {
      "title": "Cluster Multi-GPU Overview",
      "uid": "gpu-cluster-overview",
      "tags": ["gpu", "cluster", "overview", "dcgm", "external"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Thanos", "value": "Thanos" },
            "hide": 0,
            "label": "Datasource",
            "refresh": 1
          },
          {
            "name": "node",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "query": "label_values(up{group=\"external-gpu\"}, server)",
            "label": "Node",
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "current": { "text": "All", "value": "$__all" },
            "hide": 0,
            "refresh": 2,
            "sort": 1
          }
        ]
      },
      "panels": [

        {
          "id": 1,
          "type": "stat",
          "title": "활성 노드",
          "description": "현재 up 상태인 GPU 노드 수",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",   "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "text": { "valueSize": 40 }
          },
          "targets": [
            {
              "expr": "count(up{job=\"external-gpu-nodes\"} == 1) OR vector(0)",
              "legendFormat": "Active",
              "instant": true
            }
          ]
        },

        {
          "id": 2,
          "type": "stat",
          "title": "장애 노드",
          "description": "현재 down 상태인 GPU 노드 수",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red",   "value": 2 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "text": { "valueSize": 40 }
          },
          "targets": [
            {
              "expr": "sum(up{job=\"external-gpu-nodes\"} == 0) OR vector(0)",
              "legendFormat": "Failed",
              "instant": true
            }
          ]
        },

        {
          "id": 3,
          "type": "stat",
          "title": "전체 GPU 수",
          "description": "스크랩 중인 총 GPU 디바이스 수",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": {
                "mode": "absolute",
                "steps": [ { "color": "blue", "value": null } ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "text": { "valueSize": 40 }
          },
          "targets": [
            {
              "expr": "count(DCGM_FI_DEV_GPU_UTIL{group=\"external-gpu\"}) OR vector(0)",
              "legendFormat": "GPUs",
              "instant": true
            }
          ]
        },

        {
          "id": 4,
          "type": "stat",
          "title": "평균 GPU 사용률",
          "description": "전체 GPU 평균 utilization",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red",    "value": 90 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto",
            "text": { "valueSize": 36 }
          },
          "targets": [
            {
              "expr": "avg(DCGM_FI_DEV_GPU_UTIL{group=\"external-gpu\"})",
              "legendFormat": "Avg GPU Util",
              "instant": true
            }
          ]
        },

        {
          "id": 5,
          "type": "stat",
          "title": "평균 GPU 온도",
          "description": "전체 GPU 평균 온도",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 75 },
                  { "color": "red",    "value": 85 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto",
            "text": { "valueSize": 36 }
          },
          "targets": [
            {
              "expr": "avg(DCGM_FI_DEV_GPU_TEMP{group=\"external-gpu\"})",
              "legendFormat": "Avg GPU Temp",
              "instant": true
            }
          ]
        },

        {
          "id": 6,
          "type": "stat",
          "title": "전체 GPU 메모리 사용",
          "description": "전체 GPU 합계 사용 메모리",
          "gridPos": { "x": 20, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "decbytes",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 53687091200 },
                  { "color": "red",    "value": 80530636800 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "text": { "valueSize": 30 }
          },
          "targets": [
            {
              "expr": "sum(DCGM_FI_DEV_FB_USED{group=\"external-gpu\"})",
              "legendFormat": "Total Mem Used",
              "instant": true
            }
          ]
        },

        {
          "id": 10,
          "type": "row",
          "title": "노드 상태 타임라인",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 1 },
          "collapsed": false
        },

        {
          "id": 11,
          "type": "state-timeline",
          "title": "노드 Up/Down 상태 (노드 수에 따라 행 자동 증가)",
          "description": "노드가 추가될수록 행이 자동으로 늘어납니다. 노드 이름 클릭 시 상세 대시보드로 이동합니다.",
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",   "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "custom": {
                "lineWidth": 0,
                "fillOpacity": 90,
                "spanNulls": false
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red"   } } },
                { "type": "value", "options": { "1": { "text": "UP",   "color": "green" } } }
              ],
              "links": [
                {
                  "title": "노드 상세 대시보드 →",
                  "url": "/d/node_detail?var-node=${__field.labels.server}&${__url_time_range}",
                  "targetBlank": false
                }
              ]
            }
          },
          "options": {
            "mergeValues": true,
            "showValue": "auto",
            "alignValue": "center",
            "rowHeight": 0.9,
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          },
          "targets": [
            {
              "expr": "up{job=\"external-gpu-nodes\"}",
              "legendFormat": "{{server}}",
              "instant": false
            }
          ]
        },

        {
          "id": 20,
          "type": "row",
          "title": "GPU 메트릭 (노드별 그리드)",
          "gridPos": { "x": 0, "y": 13, "w": 24, "h": 1 },
          "collapsed": false
        },

        {
          "id": 21,
          "type": "timeseries",
          "title": "GPU 사용률 — $node",
          "description": "$node 변수 값 1개당 패널 1개 생성. 노드 추가 시 자동으로 그리드 확장.",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "repeat": "node",
          "repeatDirection": "h",
          "maxPerRow": 2,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red",    "value": 90 }
                ]
              },
              "links": [
                {
                  "title": "노드 상세 대시보드 →",
                  "url": "/d/node_detail?var-node=${node}&${__url_time_range}",
                  "targetBlank": false
                }
              ]
            }
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL{group=\"external-gpu\", server=~\"$node\"}",
              "legendFormat": "GPU {{gpu}}"
            }
          ]
        },

        {
          "id": 22,
          "type": "timeseries",
          "title": "GPU 메모리 사용량 — $node",
          "gridPos": { "x": 0, "y": 22, "w": 12, "h": 8 },
          "repeat": "node",
          "repeatDirection": "h",
          "maxPerRow": 2,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "decbytes",
              "min": 0,
              "color": { "mode": "palette-classic" },
              "links": [
                {
                  "title": "노드 상세 대시보드 →",
                  "url": "/d/node_detail?var-node=${node}&${__url_time_range}",
                  "targetBlank": false
                }
              ]
            }
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED{group=\"external-gpu\", server=~\"$node\"}",
              "legendFormat": "GPU {{gpu}} Used"
            },
            {
              "expr": "DCGM_FI_DEV_FB_FREE{group=\"external-gpu\", server=~\"$node\"}",
              "legendFormat": "GPU {{gpu}} Free"
            }
          ]
        },

        {
          "id": 23,
          "type": "timeseries",
          "title": "GPU 온도 — $node",
          "gridPos": { "x": 0, "y": 30, "w": 12, "h": 8 },
          "repeat": "node",
          "repeatDirection": "h",
          "maxPerRow": 2,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 75 },
                  { "color": "red",    "value": 85 }
                ]
              },
              "links": [
                {
                  "title": "노드 상세 대시보드 →",
                  "url": "/d/node_detail?var-node=${node}&${__url_time_range}",
                  "targetBlank": false
                }
              ]
            }
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_TEMP{group=\"external-gpu\", server=~\"$node\"}",
              "legendFormat": "GPU {{gpu}} Temp"
            }
          ]
        },

        {
          "id": 24,
          "type": "timeseries",
          "title": "GPU 전력 소모 — $node",
          "gridPos": { "x": 0, "y": 38, "w": 12, "h": 8 },
          "repeat": "node",
          "repeatDirection": "h",
          "maxPerRow": 2,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 300 },
                  { "color": "red",    "value": 380 }
                ]
              },
              "links": [
                {
                  "title": "노드 상세 대시보드 →",
                  "url": "/d/node_detail?var-node=${node}&${__url_time_range}",
                  "targetBlank": false
                }
              ]
            }
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE{group=\"external-gpu\", server=~\"$node\"}",
              "legendFormat": "GPU {{gpu}} Power"
            }
          ]
        }

      ]
    }
