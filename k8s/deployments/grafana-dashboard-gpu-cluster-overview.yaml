apiVersion: v1
data:
  gpu-cluster-overview.json: |
    {
      "title": "Cluster Multi-GPU Overview",
      "uid": "gpu-cluster-overview",
      "tags": [
        "gpu",
        "cluster",
        "overview",
        "dcgm",
        "external"
      ],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 38,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Thanos",
              "value": "Thanos"
            },
            "hide": 0,
            "label": "Datasource",
            "refresh": 1
          },
          {
            "name": "loki_datasource",
            "type": "datasource",
            "query": "loki",
            "current": {},
            "hide": 0,
            "label": "Loki",
            "refresh": 1
          },
          {
            "name": "host",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "${loki_datasource}"
            },
            "query": {
              "label": "host",
              "refId": "StandardVariableQuery",
              "stream": "",
              "type": 1
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": false,
            "hide": 0,
            "label": "서버",
            "options": [],
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "활성 노드",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 4,
            "h": 3
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "text": {
              "valueSize": 40
            }
          },
          "targets": [
            {
              "expr": "count(up{job=\"external-gpu-nodes\"}== 1) OR vector(0)",
              "legendFormat": "Active",
              "instant": true
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "장애 노드",
          "gridPos": {
            "x": 4,
            "y": 0,
            "w": 4,
            "h": 3
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 2
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "text": {
              "valueSize": 40
            }
          },
          "targets": [
            {
              "expr": "sum(up{job=\"external-gpu-nodes\"} == 0) OR vector(0)",
              "legendFormat": "Failed",
              "instant": true
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "전체 GPU 수",
          "gridPos": {
            "x": 8,
            "y": 0,
            "w": 4,
            "h": 3
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "text": {
              "valueSize": 40
            }
          },
          "targets": [
            {
              "expr": "count(DCGM_FI_DEV_GPU_UTIL{group=\"external-gpu\",instance!~\".+:[0-9]+\"})",
              "instant": true
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "Error Node 현황",
          "gridPos": {
            "x": 0,
            "y": 3,
            "w": 24,
            "h": 1
          },
          "collapsed": false
        },
        {
          "id": 11,
          "type": "table",
          "title": "이상 노드 현황 (정상 노드 자동 제외 · 노드명 클릭 → Node Detail)",
          "description": "Warning(주황): CPU/Mem/Disk/GPU사용률>80%, GPU온도>75°C | Error(빨강): 각 지표>90%(온도>83°C), XID/ECC 발생, 수집불능. 구분자는 쉼표(Grafana groupBy 제약).",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 24,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "CPU_W",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace(((((1-avg by(server)(rate(node_cpu_seconds_total{job=\"external-gpu-nodes\",mode=\"idle\"}[10m])))*100) > 80) < 90) * 0 + 1, \"reason\", \"CPU High\", \"server\", \".*\"), \"sev\", \"1\", \"server\", \".*\")"
            },
            {
              "refId": "CPU_E",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace(((1-avg by(server)(rate(node_cpu_seconds_total{job=\"external-gpu-nodes\",mode=\"idle\"}[10m])))*100 > 90) * 0 + 1, \"reason\", \"CPU Critical\", \"server\", \".*\"), \"sev\", \"2\", \"server\", \".*\")"
            },
            {
              "refId": "MEM_W",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace(((avg by(server)((1-node_memory_MemAvailable_bytes{job=\"external-gpu-nodes\"}/node_memory_MemTotal_bytes{job=\"external-gpu-nodes\"}))*100 > 80) < 90) * 0 + 1, \"reason\", \"Mem High\", \"server\", \".*\"), \"sev\", \"1\", \"server\", \".*\")"
            },
            {
              "refId": "MEM_E",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace((avg by(server)((1-node_memory_MemAvailable_bytes{job=\"external-gpu-nodes\"}/node_memory_MemTotal_bytes{job=\"external-gpu-nodes\"}))*100 > 90) * 0 + 1, \"reason\", \"Mem Critical\", \"server\", \".*\"), \"sev\", \"2\", \"server\", \".*\")"
            },
            {
              "refId": "DISK_W",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace(((((1-sum by(server)(node_filesystem_avail_bytes{job=\"external-gpu-nodes\",fstype=~\"ext4|xfs|btrfs|vfat\"})/sum by(server)(node_filesystem_size_bytes{job=\"external-gpu-nodes\",fstype=~\"ext4|xfs|btrfs|vfat\"}))*100) > 80) < 90) * 0 + 1, \"reason\", \"Disk High\", \"server\", \".*\"), \"sev\", \"1\", \"server\", \".*\")"
            },
            {
              "refId": "DISK_E",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace(((1-sum by(server)(node_filesystem_avail_bytes{job=\"external-gpu-nodes\",fstype=~\"ext4|xfs|btrfs|vfat\"})/sum by(server)(node_filesystem_size_bytes{job=\"external-gpu-nodes\",fstype=~\"ext4|xfs|btrfs|vfat\"}))*100 > 90) * 0 + 1, \"reason\", \"Disk Full\", \"server\", \".*\"), \"sev\", \"2\", \"server\", \".*\")"
            },
            {
              "refId": "GPU_UTIL_W",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace(((avg by(server)(DCGM_FI_DEV_GPU_UTIL{group=\"external-gpu\"}) > 80) < 90) * 0 + 1, \"reason\", \"GPU Util High\", \"server\", \".*\"), \"sev\", \"1\", \"server\", \".*\")"
            },
            {
              "refId": "GPU_UTIL_E",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace((avg by(server)(DCGM_FI_DEV_GPU_UTIL{group=\"external-gpu\"}) > 90) * 0 + 1, \"reason\", \"GPU Util Critical\", \"server\", \".*\"), \"sev\", \"2\", \"server\", \".*\")"
            },
            {
              "refId": "GPU_TEMP_W",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace(((max by(server)(DCGM_FI_DEV_GPU_TEMP{group=\"external-gpu\"}) > 75) < 83) * 0 + 1, \"reason\", \"GPU Temp High\", \"server\", \".*\"), \"sev\", \"1\", \"server\", \".*\")"
            },
            {
              "refId": "GPU_TEMP_E",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace((max by(server)(DCGM_FI_DEV_GPU_TEMP{group=\"external-gpu\"}) > 83) * 0 + 1, \"reason\", \"GPU Temp Critical\", \"server\", \".*\"), \"sev\", \"2\", \"server\", \".*\")"
            },
            {
              "refId": "XID_E",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace((max by(server)(increase(DCGM_FI_DEV_XID_ERRORS{group=\"external-gpu\"}[10m])) > 0) * 0 + 1, \"reason\", \"XID Error\", \"server\", \".*\"), \"sev\", \"2\", \"server\", \".*\")"
            },
            {
              "refId": "ECC_E",
              "instant": true,
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace((max by(server)(increase(DCGM_FI_DEV_ECC_DBE_VOL{group=\"external-gpu\"}[10m])) > 0) * 0 + 1, \"reason\", \"ECC DBE Error\", \"server\", \".*\"), \"sev\", \"2\", \"server\", \".*\")"
            },
            {
              "refId": "DOWN_E",
              "instant": true,
              "format": "table",
              "range": false,
              "legendFormat": "",
              "expr": "label_replace(label_replace((min by(server)(up{job=\"external-gpu-nodes\"}) < 1) * 0 + 1, \"reason\", \"Node Down\", \"server\", \".*\"), \"sev\", \"2\", \"server\", \".*\")"
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            },
            {
              "id": "convertFieldType",
              "options": {
                "conversions": [
                  {
                    "targetField": "sev",
                    "destinationType": "number"
                  }
                ]
              }
            },
            {
              "id": "groupBy",
              "options": {
                "fields": {
                  "server": {
                    "aggregations": [],
                    "operation": "groupby"
                  },
                  "reason": {
                    "aggregations": ["allValues"],
                    "operation": "aggregate"
                  },
                  "sev": {
                    "aggregations": ["max"],
                    "operation": "aggregate"
                  }
                }
              }
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "server": "노드명",
                  "reason (allValues)": "장애 원인",
                  "sev (max)": "상태"
                },
                "indexByName": {
                  "server": 0,
                  "sev (max)": 1,
                  "reason (allValues)": 2
                },
                "excludeByName": {
                  "Time": true,
                  "Value": true
                }
              }
            },
            {
              "id": "filterByValue",
              "options": {
                "filters": [
                  {
                    "fieldName": "상태", 
                    "config": {
                      "id": "greater",
                      "options": {
                        "value": 0 // 상태(sev) 값이 0보다 큰(1 또는 2) 경우만 '포함'
                      }
                    }
                  }
                ],
                "type": "include" // 위 조건에 맞는 데이터만 테이블에 남김
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "left",
                "minWidth": 100
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "노드명"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 200
                  },
                  {
                    "id": "custom.pinned",
                    "value": "left"
                  },
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "",
                        "url": "/d/node_detail?var-datasource=${datasource}&var-node_name=${__data.fields.노드명}&${__url_time_range}",
                        "targetBlank": false
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "상태"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 100
                  },
                  {
                    "id": "custom.align",
                    "value": "center"
                  },
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "color",
                    "value": {
                      "mode": "thresholds"
                    }
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "transparent",
                          "value": null
                        },
                        {
                          "color": "orange",
                          "value": 1
                        },
                        {
                          "color": "red",
                          "value": 2
                        }
                      ]
                    }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "1": {
                            "text": "Warning",
                            "index": 0
                          },
                          "2": {
                            "text": "Error",
                            "index": 1
                          }
                        }
                      }
                    ]
                  },
                  {
                    "id": "decimals",
                    "value": 0
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "장애 원인"
                },
                "properties": [
                  {
                    "id": "custom.minWidth",
                    "value": 300
                  },
                  {
                    "id": "custom.wrap",
                    "value": true
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "상태",
                "desc": true
              }
            ],
            "footer": {
              "show": false
            }
          }
        },
        {
          "id": 20,
          "type": "row",
          "title": "에러 로그 (GPU 서버)",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 24,
            "h": 1
          },
          "collapsed": false
        },
        {
          "id": 21,
          "type": "table",
          "title": "에러 / 경고 로그 실시간",
          "description": "GPU 서버 Promtail 수집 로그. 상단 '서버' 변수로 특정 호스트 필터링.",
          "gridPos": {
            "x": 0,
            "y": 13,
            "w": 24,
            "h": 10
          },
          "datasource": {
            "type": "loki",
            "uid": "${loki_datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "loki",
                "uid": "${loki_datasource}"
              },
              "expr": "{job=~\"varlogs|systemd-journal|dcgm-exporter\", host=~\"${host}\"} |~ \"(?i)(error|fatal|critical|warn|aborting)\" | regexp \"(?P<level>ERROR|WARN|WARNING|FATAL|CRITICAL|ABORT|ABORTING|error|warn|warning|fatal|critical|abort|aborting)\"",
              "queryType": "range",
              "legendFormat": "",
              "maxLines": 500
            }
          ],
          "transformations": [
            {
              "id": "extractFields",
              "options": {
                "source": "labels",
                "format": "json",
                "replace": false
              }
            },
            {
              "id": "filterFieldsByName",
              "options": {
                "include": {
                  "names": [
                    "Time",
                    "server",
                    "filename",
                    "level",
                    "Line"
                  ]
                }
              }
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "Time": "시간",
                  "server": "서버",
                  "filename": "로그 경로",
                  "level": "레벨",
                  "Line": "로그 상세"
                },
                "indexByName": {
                  "Time": 0,
                  "server": 1,
                  "filename": 2,
                  "level": 3,
                  "Line": 4
                },
                "excludeByName": {}
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "left",
                "minWidth": 80,
                "wrap": true,
                "cellOptions": {
                  "type": "auto",
                  "wrapText": true
                }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "transparent",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 2
                  }
                ]
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "시간"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 150
                  },
                  {
                    "id": "unit",
                    "value": "time:YY-MM-DD HH:mm:ss"
                  },
                  {
                    "id": "custom.align",
                    "value": "center"
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "auto",
                      "wrapText": true
                    }
                  },
                  {
                    "id": "custom.wrap",
                    "value": true
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "서버"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 150
                  },
                  {
                    "id": "custom.align",
                    "value": "center"
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "auto",
                      "wrapText": true
                    }
                  },
                  {
                    "id": "custom.wrap",
                    "value": true
                  },
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "Node Detail",
                        "url": "/d/node_detail?var-datasource=${datasource}&var-node_name=${__data.fields.서버}&${__url_time_range}",
                        "targetBlank": false
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "로그 경로"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 230
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "auto",
                      "wrapText": true
                    }
                  },
                  {
                    "id": "custom.wrap",
                    "value": true
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "레벨"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 90
                  },
                  {
                    "id": "custom.align",
                    "value": "center"
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background",
                      "wrapText": true
                    }
                  },
                  {
                    "id": "custom.wrap",
                    "value": true
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "FATAL": {
                            "text": "FATAL",
                            "color": "dark-red",
                            "index": 0
                          },
                          "fatal": {
                            "text": "FATAL",
                            "color": "dark-red",
                            "index": 1
                          },
                          "CRITICAL": {
                            "text": "CRITICAL",
                            "color": "dark-red",
                            "index": 2
                          },
                          "critical": {
                            "text": "CRITICAL",
                            "color": "dark-red",
                            "index": 3
                          },
                          "ABORT": {
                            "text": "ABORT",
                            "color": "dark-red",
                            "index": 4
                          },
                          "abort": {
                            "text": "ABORT",
                            "color": "dark-red",
                            "index": 5
                          },
                          "ABORTING": {
                            "text": "ABORT",
                            "color": "dark-red",
                            "index": 6
                          },
                          "aborting": {
                            "text": "ABORT",
                            "color": "dark-red",
                            "index": 7
                          },
                          "ERROR": {
                            "text": "ERROR",
                            "color": "red",
                            "index": 8
                          },
                          "error": {
                            "text": "ERROR",
                            "color": "red",
                            "index": 9
                          },
                          "WARNING": {
                            "text": "WARN",
                            "color": "orange",
                            "index": 10
                          },
                          "warning": {
                            "text": "WARN",
                            "color": "orange",
                            "index": 11
                          },
                          "WARN": {
                            "text": "WARN",
                            "color": "orange",
                            "index": 12
                          },
                          "warn": {
                            "text": "WARN",
                            "color": "orange",
                            "index": 13
                          }
                        }
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "로그 상세"
                },
                "properties": [
                  {
                    "id": "custom.minWidth",
                    "value": 600
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "auto",
                      "wrapText": true
                    }
                  },
                  {
                    "id": "custom.wrap",
                    "value": true
                  }
