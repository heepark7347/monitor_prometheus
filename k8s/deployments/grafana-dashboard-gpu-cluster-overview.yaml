apiVersion: v1
data:
  gpu-cluster-overview.json: '{"title": "Cluster Multi-GPU Overview", "uid": "gpu-cluster-overview",
    "tags": ["gpu", "cluster", "overview", "dcgm", "external"], "timezone": "browser",
    "schemaVersion": 38, "version": 2, "refresh": "30s", "time": {"from": "now-1h",
    "to": "now"}, "templating": {"list": [{"name": "datasource", "type": "datasource",
    "query": "prometheus", "current": {"text": "Thanos", "value": "Thanos"}, "hide":
    0, "label": "Datasource", "refresh": 1}, {"name": "node", "type": "query", "datasource":
    {"type": "prometheus", "uid": "${datasource}"}, "query": "label_values(up{group=\"external-gpu\"},
    server)", "label": "Node", "multi": true, "includeAll": true, "allValue": ".*",
    "current": {"text": "All", "value": "$__all"}, "hide": 0, "refresh": 2, "sort":
    1}]}, "panels": [{"id": 1, "type": "stat", "title": "활성 노드", "description": "현재
    up 상태인 GPU 노드 수", "gridPos": {"x": 0, "y": 0, "w": 4, "h": 4}, "datasource": {"type":
    "prometheus", "uid": "${datasource}"}, "fieldConfig": {"defaults": {"unit": "short",
    "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color":
    "red", "value": null}, {"color": "green", "value": 1}]}}}, "options": {"reduceOptions":
    {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none", "textMode":
    "auto", "text": {"valueSize": 40}}, "targets": [{"expr": "count(up{job=\"external-gpu-nodes\"}
    == 1) OR vector(0)", "legendFormat": "Active", "instant": true}]}, {"id": 2, "type":
    "stat", "title": "장애 노드", "description": "현재 down 상태인 GPU 노드 수", "gridPos": {"x":
    4, "y": 0, "w": 4, "h": 4}, "datasource": {"type": "prometheus", "uid": "${datasource}"},
    "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"},
    "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null},
    {"color": "yellow", "value": 1}, {"color": "red", "value": 2}]}}}, "options":
    {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode":
    "none", "textMode": "auto", "text": {"valueSize": 40}}, "targets": [{"expr": "sum(up{job=\"external-gpu-nodes\"}
    == 0) OR vector(0)", "legendFormat": "Failed", "instant": true}]}, {"id": 3, "type":
    "stat", "title": "전체 GPU 수", "gridPos": {"x": 8, "y": 0, "w": 4, "h": 4}, "datasource":
    {"type": "prometheus", "uid": "${datasource}"}, "fieldConfig": {"defaults": {"unit":
    "short", "color": {"mode": "fixed", "fixedColor": "blue"}, "thresholds": {"mode":
    "absolute", "steps": [{"color": "blue", "value": null}]}}}, "options": {"reduceOptions":
    {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none", "textMode":
    "auto", "text": {"valueSize": 40}}, "targets": [{"expr": "count(DCGM_FI_DEV_GPU_UTIL{group=\"external-gpu\"})",
    "legendFormat": "GPUs", "instant": true}]}, {"id": 10, "type": "row", "title":
    "노드별 리소스 현황", "gridPos": {"x": 0, "y": 4, "w": 24, "h": 1}, "collapsed": false},
    {"id": 11, "type": "table", "title": "노드 리소스 현황 (장비명 클릭 → Node Detail)", "description":
    "장비명을 클릭하면 해당 노드의 상세 대시보드로 이동합니다.", "gridPos": {"x": 0, "y": 5, "w": 24, "h":
    10}, "datasource": {"type": "prometheus", "uid": "${datasource}"}, "fieldConfig":
    {"defaults": {"unit": "percent", "min": 0, "max": 100, "decimals": 1, "color":
    {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color":
    "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value":
    90}]}, "custom": {"align": "center", "displayMode": "color-background-solid",
    "inspect": false}}, "overrides": [{"matcher": {"id": "byName", "options": "장비명"},
    "properties": [{"id": "custom.displayMode", "value": "auto"}, {"id": "custom.align",
    "value": "left"}, {"id": "unit", "value": "string"}, {"id": "links", "value":
    [{"title": "Node Detail 대시보드로 이동 →", "url": "/d/node_detail?var-datasource=${datasource}&var-node_name=${__data.fields.장비명}&${__url_time_range}",
    "targetBlank": false}]}]}]}, "options": {"showHeader": true, "sortBy": [{"displayName":
    "장비명", "desc": false}], "footer": {"show": false, "reducer": ["sum"]}}, "transformations":
    [{"id": "merge", "options": {}}, {"id": "organize", "options": {"renameByName":
    {"server": "장비명", "Value #CPU": "CPU %", "Value #MEM": "MEM %", "Value #GPU_UTIL":
    "GPU Util %", "Value #GPU_MEM": "GPU Mem %", "Value #DISK": "Disk %"}, "excludeByName":
    {"Time": true}, "indexByName": {"server": 0, "Value #CPU": 1, "Value #MEM": 2,
    "Value #GPU_UTIL": 3, "Value #GPU_MEM": 4, "Value #DISK": 5}}}], "targets": [{"refId":
    "CPU", "expr": "avg by(server) (avg without(cpu) (1 - rate(node_cpu_seconds_total{job=\"external-gpu-nodes\",
    mode=\"idle\"}[5m])) * on(instance) group_left(server) up{job=\"external-gpu-nodes\"})
    * 100", "instant": true, "legendFormat": "{{server}}"}, {"refId": "MEM", "expr":
    "avg by(server) ((1 - node_memory_MemAvailable_bytes{job=\"external-gpu-nodes\"}
    / node_memory_MemTotal_bytes{job=\"external-gpu-nodes\"}) * on(instance) group_left(server)
    up{job=\"external-gpu-nodes\"}) * 100", "instant": true, "legendFormat": "{{server}}"},
    {"refId": "GPU_UTIL", "expr": "avg by(server) (DCGM_FI_DEV_GPU_UTIL{group=\"external-gpu\"})",
    "instant": true, "legendFormat": "{{server}}"}, {"refId": "GPU_MEM", "expr": "sum
    by(server) (DCGM_FI_DEV_FB_USED{group=\"external-gpu\"}) / (sum by(server) (DCGM_FI_DEV_FB_USED{group=\"external-gpu\"})
    + sum by(server) (DCGM_FI_DEV_FB_FREE{group=\"external-gpu\"})) * 100", "instant":
    true, "legendFormat": "{{server}}"}, {"refId": "DISK", "expr": "avg by(server)
    ((sum by(instance) (node_filesystem_size_bytes{job=\"external-gpu-nodes\", fstype=~\"ext4|xfs|btrfs|vfat\"}
    - node_filesystem_avail_bytes{job=\"external-gpu-nodes\", fstype=~\"ext4|xfs|btrfs|vfat\"})
    / sum by(instance) (node_filesystem_size_bytes{job=\"external-gpu-nodes\", fstype=~\"ext4|xfs|btrfs|vfat\"}))
    * on(instance) group_left(server) up{job=\"external-gpu-nodes\"}) * 100", "instant":
    true, "legendFormat": "{{server}}"}]}]}'
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-gpu-cluster-overview
  namespace: monitoring
