# =============================================================================
# keepalived-proxy2.conf — proxy2 (BACKUP 역할)
# 배포 위치: proxy2 (10.10.120.231)
# 파일 경로: /etc/keepalived/keepalived.conf
# VIP: 10.10.120.220 — proxy1 장애 시 자동 인계
# =============================================================================

global_defs {
    router_id LVS_PROXY2          # 라우터 식별자 (proxy1과 다른 값)
    script_user root
    enable_script_security
}

# ── HAProxy 상태 체크 스크립트 ────────────────────────────────────────────────
vrrp_script chk_haproxy {
    script       "killall -0 haproxy"
    interval     2
    weight       -20
    fall         3
    rise         2
}

vrrp_instance VI_K8S_API {
    state        BACKUP               # proxy2 는 초기 BACKUP
    interface    enX0                 # VIP 를 올릴 NIC (실제 인터페이스명 확인 필요)
    virtual_router_id 51              # proxy1 과 반드시 동일한 값
    priority     100                  # proxy1(101) 보다 낮음 → 평소 BACKUP
    advert_int   1

    authentication {
        auth_type  PASS
        auth_pass  K8sVrrp24          # proxy1 과 동일 패스워드
    }

    virtual_ipaddress {
        10.10.120.220/24              # Control Plane VIP
    }

    track_script {
        chk_haproxy
    }
}
