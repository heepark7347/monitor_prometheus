# =============================================================================
# keepalived-proxy1.conf — proxy1 (MASTER 역할)
# 배포 위치: proxy1 (10.10.120.230)
# 파일 경로: /etc/keepalived/keepalived.conf
# VIP: 10.10.120.229 — k8s API 서버 로드밸런서 진입점
# =============================================================================

global_defs {
    router_id LVS_PROXY1          # 라우터 식별자 (각 노드마다 고유값)
    script_user root
    enable_script_security
}

# ── HAProxy 상태 체크 스크립트 ────────────────────────────────────────────────
# HAProxy 프로세스가 다운되면 VIP를 BACKUP(proxy2)으로 페일오버
vrrp_script chk_haproxy {
    script       "killall -0 haproxy"  # 프로세스 존재 여부 확인
    interval     2                      # 2초마다 체크
    weight       -20                    # 실패 시 priority 20 감소 → BACKUP이 인계
    fall         3                      # 3회 연속 실패 시 장애 판정
    rise         2                      # 2회 연속 성공 시 정상 판정
}

vrrp_instance VI_K8S_API {
    state        MASTER               # proxy1 은 초기 MASTER
    interface    enX0                 # VIP 를 올릴 NIC (00-env.sh VIP_INTERFACE 와 동일)
    virtual_router_id 51              # VRRP 그룹 ID (proxy1/proxy2 동일값)
    priority     101                  # proxy1 우선순위 (proxy2 보다 높음)
    advert_int   1                    # VRRP 광고 주기(초)

    # VRRP 인증 (평문, 동일 서브넷 내부 전용)
    authentication {
        auth_type  PASS
        auth_pass  K8sVrrp24          # proxy1/proxy2 동일 패스워드
    }

    # 가상 IP (VIP) 설정
    virtual_ipaddress {
        10.10.120.220/24              # Control Plane VIP
    }

    # HAProxy 헬스체크와 연동
    track_script {
        chk_haproxy
    }
}
