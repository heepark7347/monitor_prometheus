# =============================================================================
# haproxy.cfg — Kubernetes API 서버 로드밸런서
# 배포 위치: proxy1 (10.10.120.230), proxy2 (10.10.120.231)
# 파일 경로: /etc/haproxy/haproxy.cfg
# 역할: VIP(10.10.120.220):6443 수신 → master1/2/3 6443 포트로 분산
# =============================================================================

global
    log         /dev/log local0
    log         /dev/log local1 notice
    chroot      /var/lib/haproxy
    stats       socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats       timeout 30s
    user        haproxy
    group       haproxy
    daemon

    # 보안: 구식 TLS/cipher 비활성화
    ssl-default-bind-ciphers ECDH+AESGCM:DH+AESGCM:ECDH+AES256:DH+AES256:ECDH+AES128:DH+AES:!aNULL:!MD5:!DSS
    ssl-default-bind-options no-sslv3

defaults
    log         global
    mode        tcp           # TCP 모드: TLS 패스스루 (API 서버 TLS 종단처리)
    option      tcplog
    option      dontlognull
    timeout     connect 10s
    timeout     client  1m
    timeout     server  1m

# ── 관리용 Stats 페이지 (내부망 전용) ─────────────────────────────────────────
listen stats
    bind        *:8404
    mode        http
    stats       enable
    stats       uri /stats
    stats       refresh 10s
    stats       auth admin:<REPLACE_ME>   # 패스워드 변경 필수

# ── Kubernetes API 서버 프론트엔드 ────────────────────────────────────────────
frontend k8s-api-frontend
    bind        *:6443
    mode        tcp
    option      tcplog
    default_backend k8s-api-backend

# ── Kubernetes API 서버 백엔드 ────────────────────────────────────────────────
# check: 헬스체크 활성화
# inter 5s: 5초마다 체크
# fall 3: 3회 실패 시 다운 처리
# rise 2: 2회 성공 시 업 처리
backend k8s-api-backend
    mode        tcp
    option      tcp-check
    balance     roundrobin
    server      k8s-master1 10.10.120.232:6443 check inter 5s fall 3 rise 2
    server      k8s-master2 10.10.120.233:6443 check inter 5s fall 3 rise 2
    server      k8s-master3 10.10.120.234:6443 check inter 5s fall 3 rise 2
