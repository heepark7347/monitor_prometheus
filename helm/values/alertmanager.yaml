# =============================================================================
# helm/values/alertmanager.yaml
# Chart : prometheus-community/alertmanager
# 배포  : scripts/deploy-monitoring.sh 참조
#
# 배치 전략
#   - alertmanager-0 → master1 (zone-a)
#   - alertmanager-1 → master2 (zone-b)
#   - alertmanager-2 → master3 (zone-c)
# =============================================================================

image:
  repository: quay.io/prometheus/alertmanager
  tag: v0.27.0

replicaCount: 3

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-type
              operator: In
              values:
                - master
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: alertmanager
        topologyKey: "topology.kubernetes.io/zone"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

persistence:
  enabled: true
  storageClass: local-path
  size: 2Gi

service:
  type: ClusterIP
  port: 9093
  clusterPort: 9094

# ── Alertmanager 설정 ─────────────────────────────────────────────────────────
config:
  global:
    resolve_timeout: 5m

  route:
    group_by: ["alertname", "cluster", "namespace"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 12h
    receiver: "default-receiver"
    routes:
      - matchers:
          - "severity=critical"
        receiver: "critical-receiver"
      - matchers:
          - "severity=warning"
        receiver: "default-receiver"

  receivers:
    - name: "default-receiver"
    - name: "critical-receiver"

  inhibit_rules:
    - source_matchers:
        - "severity=critical"
      target_matchers:
        - "severity=warning"
      equal: ["alertname", "namespace"]
