# =============================================================================
# helm/values/alertmanager.yaml
# Chart : prometheus-community/alertmanager
# 배포  : scripts/deploy-monitoring.sh 참조
#
# 배치 전략
#   - alertmanager-0 → master1 (zone-a)
#   - alertmanager-1 → master2 (zone-b)
#   - alertmanager-2 → master3 (zone-c)
#
# 사전 준비
#   - ConfigMap 'alertmanager-config' 또는 아래 config 블록 수정
#   - Secret 'alertmanager-smtp-secret' 생성 필요 (scripts/create-secrets.sh 참조)
#     키: smtp_auth_password
# =============================================================================

image:
  registry: quay.io
  repository: prometheus/alertmanager
  tag: v0.27.0

replicaCount: 3

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-type
              operator: In
              values:
                - master
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: alertmanager
        topologyKey: "topology.kubernetes.io/zone"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

persistence:
  enabled: true
  storageClass: local-path
  size: 2Gi

# ── Alertmanager 설정 ─────────────────────────────────────────────────────────
config:
  global:
    resolve_timeout: 5m
    # SMTP 패스워드: Secret 환경변수에서 주입 — 하드코딩 금지
    smtp_from: "alertmanager@<REPLACE_ME>"
    smtp_smarthost: "<REPLACE_ME>:587"
    smtp_auth_username: "<REPLACE_ME>"
    smtp_require_tls: true

  route:
    group_by: ["alertname", "cluster", "namespace"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 12h
    receiver: "default-receiver"
    routes:
      - match:
          severity: critical
        receiver: "critical-receiver"
      - match:
          severity: warning
        receiver: "default-receiver"

  receivers:
    - name: "default-receiver"
      email_configs:
        - to: "<REPLACE_ME>"
          send_resolved: true
    - name: "critical-receiver"
      email_configs:
        - to: "<REPLACE_ME>"
          send_resolved: true

  inhibit_rules:
    - source_match:
        severity: "critical"
      target_match:
        severity: "warning"
      equal: ["alertname", "namespace"]

# ── Cluster 피어링 (3-replica HA mesh) ──────────────────────────────────────
# bitnami chart 가 아닌 prometheus-community/alertmanager 는 cluster peer 를
# clusterPeers 로 설정 (headless svc DNS 사용)
clusterPeerTimeout: 15s
clusterAdvertiseAddress: ""   # Pod IP 자동 감지

service:
  type: ClusterIP
  port: 9093
  clusterPort: 9094

# ── ServiceMonitor (kube-prometheus-stack 이 scrape) ─────────────────────────
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 30s
