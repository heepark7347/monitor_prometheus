# =============================================================================
# helm/values/snmp-exporter.yaml
# Chart : prometheus-community/prometheus-snmp-exporter
# 배포  : scripts/deploy-monitoring.sh 참조
#
# 배치 전략
#   - snmp-exporter → proxy 노드 (zone-proxy-a/b)
# =============================================================================

image:
  repository: quay.io/prometheus/snmp-exporter
  tag: v0.26.0

replicas: 2

tolerations: []   # proxy 노드는 taint 없음

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-type
              operator: In
              values:
                - proxy
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus-snmp-exporter
        topologyKey: "topology.kubernetes.io/zone"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

service:
  type: ClusterIP
  port: 9116

serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 60s
  params: []

# ── snmp.yml 기본 설정 ─────────────────────────────────────────────────────────
config: |
  auths:
    public_v2:
      community: public
      security_level: noAuthNoPriv
      auth_protocol: MD5
      priv_protocol: DES
      version: 2
    monitor_v2:
      community: monitor
      security_level: noAuthNoPriv
      auth_protocol: MD5
      priv_protocol: DES
      version: 2
  modules:
    if_mib:
      walk:
        - interfaces
      metrics:
        - name: ifOperStatus
          oid: 1.3.6.1.2.1.2.2.1.8
          type: gauge
          help: The current operational state of the interface
          indexes:
            - labelname: ifIndex
              type: gauge
          lookups:
            - labels:
                - ifIndex
              labelname: ifDescr
              oid: 1.3.6.1.2.1.2.2.1.2
              type: DisplayString
        - name: ifInOctets
          oid: 1.3.6.1.2.1.2.2.1.10
          type: counter
          help: The total number of octets received on the interface
          indexes:
            - labelname: ifIndex
              type: gauge
          lookups:
            - labels:
                - ifIndex
              labelname: ifDescr
              oid: 1.3.6.1.2.1.2.2.1.2
              type: DisplayString
        - name: ifOutOctets
          oid: 1.3.6.1.2.1.2.2.1.16
          type: counter
          help: The total number of octets transmitted out of the interface
          indexes:
            - labelname: ifIndex
              type: gauge
          lookups:
            - labels:
                - ifIndex
              labelname: ifDescr
              oid: 1.3.6.1.2.1.2.2.1.2
              type: DisplayString
    linux_mib:
      walk:
        - 1.3.6.1.4.1.2021.10   # UCD-SNMP laTable (CPU load averages)
        - 1.3.6.1.4.1.2021.4    # UCD-SNMP memTable (memory)
        - 1.3.6.1.2.1.25.2.3    # HOST-RESOURCES-MIB hrStorageTable (disk)
      metrics:
        # ── CPU Load Average ────────────────────────────────────────────────────
        - name: laLoad
          oid: 1.3.6.1.4.1.2021.10.1.3
          type: gauge
          help: Load average (1/5/15 min)
          indexes:
            - labelname: laIndex
              type: gauge
          lookups:
            - labels:
                - laIndex
              labelname: laNames
              oid: 1.3.6.1.4.1.2021.10.1.2
              type: DisplayString
        # ── Memory ──────────────────────────────────────────────────────────────
        - name: memTotalReal
          oid: 1.3.6.1.4.1.2021.4.5.0
          type: gauge
          help: Total real/physical memory in kB
        - name: memAvailReal
          oid: 1.3.6.1.4.1.2021.4.6.0
          type: gauge
          help: Available real/physical memory in kB
        # ── Disk (hrStorage) ────────────────────────────────────────────────────
        - name: hrStorageAllocationUnits
          oid: 1.3.6.1.2.1.25.2.3.1.4
          type: gauge
          help: Bytes per allocation unit
          indexes:
            - labelname: hrStorageIndex
              type: gauge
          lookups:
            - labels:
                - hrStorageIndex
              labelname: hrStorageDescr
              oid: 1.3.6.1.2.1.25.2.3.1.2
              type: DisplayString
        - name: hrStorageSize
          oid: 1.3.6.1.2.1.25.2.3.1.5
          type: gauge
          help: Total size in allocation units
          indexes:
            - labelname: hrStorageIndex
              type: gauge
          lookups:
            - labels:
                - hrStorageIndex
              labelname: hrStorageDescr
              oid: 1.3.6.1.2.1.25.2.3.1.2
              type: DisplayString
        - name: hrStorageUsed
          oid: 1.3.6.1.2.1.25.2.3.1.6
          type: gauge
          help: Used storage in allocation units
          indexes:
            - labelname: hrStorageIndex
              type: gauge
          lookups:
            - labels:
                - hrStorageIndex
              labelname: hrStorageDescr
              oid: 1.3.6.1.2.1.25.2.3.1.2
              type: DisplayString
